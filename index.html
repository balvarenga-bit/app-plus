<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Supervisores - Grupo Plus</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #1e293b; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #334155; }
        
        .app-container { width: 100%; max-width: 430px; height: 100vh; background: #f8fafc; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; }
        .active { display: flex; }
        
        /* Splash Screen */
        #screen-splash { background: #0f172a; color: white; }
        .logo-splash { width: 70%; max-width: 250px; margin-bottom: 20px; }
        
        /* Login Screen */
        #screen-login { background: #0f172a; }
        .pin-container { background: #ffffff; padding: 35px 20px; border-radius: 20px; width: 85%; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .pin-input { font-size: 28px; text-align: center; letter-spacing: 10px; font-weight: bold; width: 70%; padding: 10px; margin: 20px 0; border: 2px solid #cbd5e1; border-radius: 12px; outline: none; }
        
        /* Selector de Empresas */
        #screen-empresas { background: #0f172a; justify-content: flex-start; padding-top: 50px; }
        .titulo-empresas { font-size: 20px; font-weight: bold; color: #ffffff; margin-bottom: 30px; letter-spacing: 1px; }
        .btn-empresa { width: 85%; background: #ffffff; padding: 15px; margin: 12px 0; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: transform 0.2s; }
        .logo-btn { max-width: 160px; max-height: 50px; object-fit: contain; }
        
        /* Contenedor Principal (Home) */
        .home-container { display: flex; flex-direction: column; height: 100%; width: 100%; background: #f1f5f9; }
        
        /* Header Superior con Perfil */
        .header-saludo { background: #0f172a; padding: 20px; border-bottom: 4px solid #a3e635; color: white; text-align: left; display: flex; align-items: center; justify-content: space-between; }
        .welcome-text { font-size: 20px; font-weight: 800; color: #ffffff; }
        .supervisor-name { font-size: 12px; color: #a3e635; font-weight: bold; margin-top: 2px; text-transform: uppercase; }
        .profile-badge { background: #1e293b; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; color: #cbd5e1; border: 1px solid #334155; text-transform: uppercase; }
        
        /* Contenidos y Formularios */
        .tab-content { flex: 1; padding: 16px; overflow-y: auto; display: none; padding-bottom: 40px; }
        .tab-content.active-tab { display: block; }
        .tab-title { font-size: 18px; font-weight: bold; color: #0f172a; margin-bottom: 15px; border-left: 4px solid #a3e635; padding-left: 8px; text-transform: uppercase; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; color: #475569; margin-bottom: 6px; text-transform: uppercase; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; background-color: #fff; outline: none; }
        
        /* Sección Fichajes */
        .reloj-container { background: #0f172a; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 15px; border: 1px solid #334155; }
        .reloj-digital { font-size: 32px; font-weight: bold; color: #a3e635; font-family: monospace; }
        .fichaje-box { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn-fichaje { width: 100%; color: white; border: none; padding: 15px; font-size: 14px; font-weight: bold; border-radius: 10px; cursor: pointer; margin: 10px 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-entrada { background: #15803d; }
        .btn-salida { background: #b91c1c; }
        
        /* Matriz de Calidad */
        .matrix-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .matrix-table th { background: #0f172a; padding: 10px; font-size: 10px; color: white; text-transform: uppercase; }
        .matrix-table td { padding: 12px 6px; font-size: 13px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .matrix-item-name { font-weight: bold; color: #0f172a; text-align: left !important; padding-left: 12px !important; }
        
        /* Recuadro de Firma Blindado */
        .signature-pad-container { background: #ffffff; border: 2px dashed #cbd5e1; border-radius: 12px; position: relative; overflow: hidden; width: 100%; margin-top: 5px; }
        .signature-canvas { width: 100%; height: 150px; display: block; background: #fdfdfd; touch-action: none; }
        .btn-clear-sig { background: #64748b; color: white; border: none; padding: 6px 12px; font-size: 10px; font-weight: bold; border-radius: 6px; position: absolute; bottom: 8px; right: 8px; text-transform: uppercase; cursor: pointer; }

        .btn-submit { width: 100%; background: #0f172a; color: white; border: none; padding: 16px; font-size: 15px; font-weight: bold; border-radius: 10px; text-transform: uppercase; cursor: pointer; border-bottom: 4px solid #a3e635; }
        
        /* Menú Inferior */
        .bottom-nav { width: 100%; height: 65px; background: #ffffff; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; align-items: center; padding-bottom: 5px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 25%; font-size: 10px; color: #94a3b8; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .nav-item i { font-size: 18px; margin-bottom: 3px; }
        .nav-item.active-nav { color: #0f172a; }
        .nav-item.active-nav i { color: #a3e635; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <div id="screen-splash" class="screen active">
            <img src="https://grupoplus.com.ar/wp-content/uploads/2021/07/logo-grupo-plus.png" alt="Grupo Plus" class="logo-splash">
            <p id="splash-text" style="font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #a3e635;">INGRESANDO...</p>
        </div>

        <div id="screen-login" class="screen">
            <div class="pin-container">
                <h3 style="font-size: 18px; margin-bottom: 5px; color: #0f172a; font-weight: bold;">🔑 Acceso</h3>
                <p style="font-size: 12px; color: #64748b; margin-bottom: 15px;">Ingrese su PIN de seguridad</p>
                <input type="password" id="input-pin" class="pin-input" maxlength="4" placeholder="••••" oninput="evaluarPin(this.value)">
                <div id="login-error" style="color:#ef4444; font-size:11px; font-weight:bold; display:none;">⚠️ PIN incorrecto.</div>
            </div>
        </div>

        <div id="screen-empresas" class="screen">
            <h2 class="titulo-empresas">SELECCIONE EMPRESA</h2>
            <div class="btn-empresa" onclick="selectEmpresa('Protection Now')"><img src="https://grupoplus.com.ar/protection-now/wp-content/uploads/sites/2/2021/07/logo-protection-now.png" class="logo-btn"></div>
            <div class="btn-empresa" onclick="selectEmpresa('Limcorp')"><img src="https://grupoplus.com.ar/limcorp/wp-content/uploads/sites/4/2021/08/logo-limcorp.png" class="logo-btn"></div>
            <div class="btn-empresa" onclick="selectEmpresa('Seguvip')"><img src="https://grupoplus.com.ar/seguvip/wp-content/uploads/sites/3/2021/07/logo-seguvip.png" class="logo-btn"></div>
        </div>

        <div id="screen-home" class="screen" style="padding: 0;">
            <div class="home-container">
                <div class="header-saludo">
                    <div>
                        <div class="welcome-text" id="greeting">Buenos días,</div>
                        <div class="supervisor-name" id="sup-name">...</div>
                    </div>
                    <div class="profile-badge" id="sup-rol">SUPERVISOR</div>
                </div>

                <div id="tab-fichaje" class="tab-content active-tab">
                    <h3 class="tab-title">📍 Fichaje de Control</h3>
                    <div class="reloj-container">
                        <div class="reloj-digital" id="cronometro-fichaje">00:00:00</div>
                    </div>
                    <div class="fichaje-box">
                        <div class="form-group">
                            <label>Objetivo / Sitio</label>
                            <select id="fichaje-sitio" class="form-control"><option value="">Cargando objetivos...</option></select>
                        </div>
                        <div class="form-group">
                            <label>Observaciones de Turno</label>
                            <textarea id="fichaje-observaciones" class="form-control" rows="2"></textarea>
                        </div>
                        <button class="btn-fichaje btn-entrada" onclick="registrarFichaje('Entrada')">INICIAR RECORRIDA</button>
                        <button class="btn-fichaje btn-salida" onclick="registrarFichaje('Salida')">FINALIZAR RECORRIDA</button>
                    </div>
                </div>

                <div id="tab-informe" class="tab-content">
                    <h3 class="tab-title">📝 Auditoría General</h3>
                    <form id="form-auditoria" onsubmit="enviarReporte(event)">
                        <div class="form-group">
                            <label>Objetivo Seleccionado</label>
                            <select id="field-sitio" class="form-control" required><option value="">Seleccione...</option></select>
                        </div>
                        <div class="form-group"><label>Persona de Contacto</label><input type="text" id="field-contacto" class="form-control"></div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:15px;">
                            <div><label>Hora Ingreso</label><input type="time" id="field-horaIngreso" class="form-control" required></div>
                            <div><label>Hora Egreso</label><input type="time" id="field-horaEgreso" class="form-control" required></div>
                        </div>

                        <table class="matrix-table">
                            <thead><tr><th>Ítem de Inspección</th><th>C</th><th>NC</th><th>N/A</th></tr></thead>
                            <tbody id="matrix-body"></tbody>
                        </table>

                        <div class="form-group">
                            <label>Estado de Materiales</label>
                            <select id="field-estadoMateriales" class="form-control" required><option value="Conforme">Conforme</option><option value="No Conforme">No Conforme</option></select>
                        </div>
                        <div class="form-group"><label>Observaciones Generales</label><textarea id="field-observaciones" class="form-control" rows="2" required></textarea></div>
                        <div class="form-group">
                            <label>Estado de Máquinas</label>
                            <select id="field-estadoMaquinas" class="form-control" required><option value="Conforme">Conforme</option><option value="No Conforme">No Conforme</option></select>
                        </div>
                        <div class="form-group">
                            <label>Uso de Uniforme</label>
                            <select id="field-estadoUniforme" class="form-control" required><option value="Conforme">Conforme</option><option value="No Conforme">No Conforme</option></select>
                        </div>
                        <div class="form-group"><label>Novedades Extra</label><textarea id="field-novedades" class="form-control" rows="2"></textarea></div>
                        <div class="form-group"><label>Servicios Complementarios</label><input type="text" id="field-serviciosComplementarios" class="form-control" required></div>

                        <div class="form-group">
                            <label><i class="fa-solid fa-signature"></i> Firma del Cliente / Supervisor</label>
                            <div class="signature-pad-container">
                                <canvas id="signature-canvas" class="signature-canvas"></canvas>
                                <button type="button" class="btn-clear-sig" onclick="limpiarFirma()">Limpiar</button>
                            </div>
                        </div>

                        <button type="submit" id="btn-enviar" class="btn-submit">ENVIAR INFORME INTERNO</button>
                    </form>
                </div>

                <div class="bottom-nav">
                    <div class="nav-item active-nav" id="btn-tab-fichaje" onclick="switchTab('fichaje')"><i class="fa-solid fa-clock"></i>Fichaje</div>
                    <div class="nav-item" id="btn-tab-informe" onclick="switchTab('informe')"><i class="fa-solid fa-clipboard-check"></i>Informe</div>
                    <div class="nav-item" onclick="location.reload()"><i class="fa-solid fa-lock"></i>Salir</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwZBaAk0qGunKCVFgLzzMM-xkLs_YeU_DMzI66RZTiX5Qk_nI_t_mlMWjHCeax_Rk8C/exec";
        
        let dbSupervisores = JSON.parse(localStorage.getItem('gp_sups')) || [];
        let dbSitios = JSON.parse(localStorage.getItem('gp_sitios')) || [];
        let usuarioLogueado = null;
        let empresaSeleccionada = "";
        let canvas, ctx, dibujando = false;

        const matrixItems = ["Pisos / Alfombra", "Paredes", "Escritorios", "Alturas", "Baños", "Basura", "Cocheras", "Subsuelos", "Ascensores"];
        document.getElementById('matrix-body').innerHTML = matrixItems.map((item, index) => `
            <tr>
                <td class="matrix-item-name">${item}</td>
                <td><input type="radio" name="item_${index}" value="C" checked></td>
                <td><input type="radio" name="item_${index}" value="NC"></td>
                <td><input type="radio" name="item_${index}" value="N/A"></td>
            </tr>
        `).join('');

        window.addEventListener('DOMContentLoaded', () => {
            setInterval(() => {
                const h = new Date();
                document.getElementById('cronometro-fichaje').innerText = h.toLocaleTimeString();
            }, 1000);
            preCargarDatos();
        });

        function preCargarDatos() {
            if (dbSupervisores.length > 0 && dbSitios.length > 0) {
                changeScreen('screen-login');
            }

            fetch(`${WEB_APP_URL}?action=getSupervisores`)
            .then(r => r.json())
            .then(sups => {
                dbSupervisores = sups;
                localStorage.setItem('gp_sups', JSON.stringify(sups));
                return fetch(`${WEB_APP_URL}?action=getSitios`);
            })
            .then(r => r.json())
            .then(sitios => {
                dbSitios = sitios;
                localStorage.setItem('gp_sitios', JSON.stringify(sitios));
                changeScreen('screen-login');
            })
            .catch(e => {
                console.log("Caché activa.");
                if(dbSupervisores.length === 0) {
                    document.getElementById('splash-text').innerText = "INGRESANDO...";
                    setTimeout(preCargarDatos, 3000);
                }
            });
        }

        function evaluarPin(pin) {
            if (pin.length === 4) {
                const user = dbSupervisores.find(u => u.pin === pin.toString().trim());
                if (user) {
                    usuarioLogueado = user;
                    changeScreen('screen-empresas');
                } else {
                    document.getElementById('login-error').style.display = "block";
                    document.getElementById('input-pin').value = "";
                }
            }
        }

        function selectEmpresa(empresa) {
            empresaSeleccionada = empresa;
            
            // Lógica de Saludo Horario Blindada
            const h = new Date().getHours();
            let saludo = "Buenos días ☀️";
            if(h >= 12 && h < 20) saludo = "Buenas tardes ⛅";
            if(h >= 20 || h < 6) saludo = "Buenas noches 🌙";
            
            document.getElementById('greeting').innerText = saludo;
            document.getElementById('sup-name').innerText = usuarioLogueado.nombre;
            document.getElementById('sup-rol').innerText = usuarioLogueado.rol || "SUPERVISOR";
            
            const filtrados = dbSitios.filter(s => s.empresa.toLowerCase() === empresa.toLowerCase());
            const selects = [document.getElementById('fichaje-sitio'), document.getElementById('field-sitio')];
            selects.forEach(sel => {
                sel.innerHTML = '<option value="">Seleccione objetivo...</option>';
                filtrados.forEach(s => sel.innerHTML += `<option value="${s.sitio}">${s.sitio}</option>`);
            });

            changeScreen('screen-home');
        }

        function registrarFichaje(tipo) {
            const sitio = document.getElementById('fichaje-sitio').value;
            if(!sitio) return alert("Seleccione objetivo");
            
            const payload = {
                tipo_registro: "fichaje", supervisor: `${usuarioLogueado.nombre} (${empresaSeleccionada})`,
                sitio, accion: tipo, hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), observacionesFichaje: document.getElementById('fichaje-observaciones').value
            };

            fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
            .then(() => {
                alert(`✅ ${tipo} registrado.`);
                document.getElementById('fichaje-observaciones').value = "";
                if(tipo === 'Entrada') switchTab('informe');
            });
        }

        function initFirmaCanvas() {
            canvas = document.getElementById('signature-canvas');
            if(!canvas) return;
            ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 150; 
            ctx.strokeStyle = "#0f172a"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.lineJoin = "round";

            function obtenerPosTouch(e) {
                const rect = canvas.getBoundingClientRect();
                const clX = e.touches ? e.touches[0].clientX : e.clientX;
                const clY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clX - rect.left, y: clY - rect.top };
            }
            canvas.addEventListener('touchstart', function(e) { dibujando = true; const pos = obtenerPosTouch(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }, { passive: false });
            canvas.addEventListener('touchmove', function(e) { if (!dibujando) return; e.preventDefault(); const pos = obtenerPosTouch(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }, { passive: false });
            canvas.addEventListener('touchend', function() { dibujando = false; });
            canvas.addEventListener('mousedown', function(e) { dibujando = true; const pos = obtenerPosTouch(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); });
            canvas.addEventListener('mousemove', function(e) { if (dibujando) { const pos = obtenerPosTouch(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); } });
            window.addEventListener('mouseup', function() { dibujando = false; });
        }

        function limpiarFirma() { if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function enviarReporte(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-enviar');
            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            const payload = {
                tipo_registro: "informe",
                supervisor: `${usuarioLogueado.nombre} (${empresaSeleccionada})`,
                contacto: document.getElementById('field-contacto').value,
                sitio: document.getElementById('field-sitio').value,
                horaIngreso: document.getElementById('field-horaIngreso').value,
                horaEgreso: document.getElementById('field-horaEgreso').value,
                estadoMateriales: document.getElementById('field-estadoMateriales').value,
                observaciones: document.getElementById('field-observaciones').value,
                estadoMaquinas: document.getElementById('field-estadoMaquinas').value,
                estadoUniforme: document.getElementById('field-estadoUniforme').value,
                novedades: document.getElementById('field-novedades').value,
                serviciosComplementarios: document.getElementById('field-serviciosComplementarios').value
            };

            matrixItems.forEach((_, i) => {
                payload[`item_${i}`] = document.querySelector(`input[name="item_${i}"]:checked`)?.value || "-";
            });

            fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
            .then(() => {
                alert("✅ Informe guardado con éxito.");
                document.getElementById('form-auditoria').reset();
                limpiarFirma();
                switchTab('fichaje');
            })
            .catch(() => alert("Error de conexión"))
            .finally(() => { btn.innerText = "ENVIAR INFORME INTERNO"; btn.disabled = false; });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById('tab-' + tabId).classList.add('active-tab');
            document.getElementById('btn-tab-' + tabId).classList.add('active-nav');
            
            if(tabId === 'informe') setTimeout(initFirmaCanvas, 200);
        }

        function changeScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
